<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>겨울잠의 투자 부트캠프 — 4주 오프라인 소수정예</title>
<meta name="description" content="미국주식 + 서울&수도권 아파트, 두 마리 토끼를 잡는 소수정예 실전 맞춤수업. 1:1 코칭과 임장 동행 포함. 얼리버드 220만 원.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    --navy:#0a0f1a; --line-navy:#1d2739;
    --cream:#f7f5f0; --gold:#b99a5b; --gold-soft:#cbb27c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a1a4f;font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif;color:var(--cream)}
  a{text-decoration:none;color:inherit;transition:color .2s,background .2s}
  img{display:block;width:100%}

  nav{position:sticky;top:0;z-index:100;background:rgba(10,15,26,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line-navy)}
  .nav-in{max-width:820px;margin:0 auto;padding:0 20px;height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .logo{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:900;color:var(--cream)}
  .back{font-size:13.5px;font-weight:600;color:#aeb6c2}
  .back:hover{color:var(--cream)}

  .detail{max-width:773px;margin:0 auto}
  .detail img{margin:0}

  .cta-bar{position:sticky;bottom:0;z-index:100;background:rgba(10,15,26,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid rgba(185,154,91,.4);padding:12px 16px calc(12px + env(safe-area-inset-bottom))}
  .cta-in{max-width:773px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px}
  .cta-price{line-height:1.3}
  .cta-price .old{font-size:12px;color:#6b7688;text-decoration:line-through}
  .cta-price .now{font-size:17px;font-weight:800;color:#fff}
  .cta-price .now em{font-style:normal;color:var(--gold-soft)}
  .cta-btn{flex:none;background:var(--gold);color:var(--navy);font-weight:800;font-size:15.5px;padding:15px 32px;text-align:center}
  .cta-btn:hover{background:var(--gold-soft)}
  @media (max-width:420px){
    .cta-btn{padding:14px 22px;font-size:14.5px}
  }

  footer{background:var(--navy);color:#6b7688;text-align:center;font-size:12px;padding:28px 20px 40px;line-height:1.8}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <a href="index.html" class="logo">겨울잠</a>
    <a href="index.html" class="back">← 홈으로 돌아가기</a>
  </div>
</nav>

<div class="detail">
  <img src="img/bc-01.jpg" alt="겨울잠의 투자 부트캠프 — 미국주식 + 서울&수도권 아파트 실전 맞춤수업" fetchpriority="high">
  <img src="img/bc-02.jpg" alt="투자, 여전히 막막하게만 느껴지나요?" loading="lazy">
  <img src="img/bc-03.jpg" alt="월급 146만 원에서 시작한 32억 자산가의 현실 이야기" loading="lazy">
  <img src="img/bc-04.jpg" alt="300권 독서와 실행으로 만든 결과 — 아파트 4채와 8.9억 금융자산" loading="lazy">
  <img src="img/bc-05.jpg" alt="겨울잠 부트캠프 핵심 소개" loading="lazy">
  <img src="img/bc-06.jpg" alt="강사의 32억 자산 노하우를 당신의 것으로 — 이론 강의와의 비교" loading="lazy">
  <img src="img/bc-07.jpg" alt="이런 고민이 있다면 겨울잠 부트캠프가 해답이 됩니다" loading="lazy">
  <img src="img/bc-08.jpg" alt="수강생 실제 후기" loading="lazy">
  <img src="img/bc-09.jpg" alt="포인트 1 — 실전 중심 커리큘럼과 Real Practice" loading="lazy">
  <img src="img/bc-10.jpg" alt="포인트 2 — 미국주식 + 한국부동산 2in1 올인원 수업, 평촌 신도시 임장" loading="lazy">
  <img src="img/bc-11.jpg" alt="포인트 3 — 소수정예 1:1 맞춤 포트폴리오 설계" loading="lazy">
  <img src="img/bc-12.jpg" alt="포인트 4 — 수료 이후에도 성장하는 케어 서비스" loading="lazy">
  <img src="img/bc-13.jpg" alt="4주 커리큘럼 — 자금관리, 미국주식, 부동산, 포트폴리오 관리" loading="lazy">
</div>

<!-- ※ 신청 버튼 href를 실제 신청 링크(구글폼/아임웹 결제 페이지 등)로 교체하세요 -->
<div class="cta-bar">
  <div class="cta-in">
    <div class="cta-price">
      <p class="old">정상가 250만 원</p>
      <p class="now">얼리버드 <em>220만 원</em></p>
    </div>
    <a href="index.html#contact" class="cta-btn">부트캠프 신청하기</a>
  </div>
</div>

<footer>
  겨울잠의 투자 부트캠프 · 오프라인 4주 과정 · 소수정예 10명 이내<br>
  © 2026 겨울잠. All rights reserved.
</footer>

</body>
</html>
